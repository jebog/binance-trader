[tool.ruff]
target-version = "py311"

[tool.ruff.lint]
select = ["E", "F", "W", "I"]   # pycodestyle + pyflakes + isort
ignore = ["E501"]                # line length — not enforced in this project

[tool.ruff.lint.per-file-ignores]
# scanner.py uses intentional late imports — `import sys` must come after
# SCANNER_DIR/LOG_FILE path setup, and `from config import` must come after
# the TeeLogger guard — enforcing isort would break this architecture.
"scanner.py" = ["I001"]

[tool.mypy]
python_version = "3.11"
ignore_missing_imports = true    # Textual / dotenv have no stubs
strict_optional = true
warn_return_any = false          # JSON-heavy code returns Any frequently

[tool.pytest.ini_options]
testpaths = ["tests"]
addopts   = "-q"
